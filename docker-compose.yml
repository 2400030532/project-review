version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: easyintern-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: easyintern
      MYSQL_USER: easyintern
      MYSQL_PASSWORD: easyintern@123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - easyintern-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easyintern-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/easyintern
      SPRING_DATASOURCE_USERNAME: easyintern
      SPRING_DATASOURCE_PASSWORD: easyintern@123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - easyintern-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easyintern-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - easyintern-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  easyintern-network:
    driver: bridge
